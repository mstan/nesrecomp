# game.cfg — Faxanadu (NES, Mapper 1 / MMC1, 16 PRG banks, CHR RAM)
output_prefix faxanadu

# ── Bank-switch trampolines ───────────────────────────────────────────────────
# JSR $F859 is followed by 3 inline data bytes (bank, addr_lo, addr_hi).
# $CC1A is the MMC1 PRG bank-switch function in the fixed bank.
# Format: trampoline <hex_addr> <inline_bytes> <hex_bs_fn_addr>
trampoline F859 3 CC1A

# ── Known 2-byte LE dispatch tables ──────────────────────────────────────────
# Each entry is a (target-1) LE16 pair. Format: known_table <bank> <start> <end>
known_table 14 8087 8151   # bank14 main entity state dispatch (101 entries)
known_table 14 8958 8968   # bank14 entity state dispatch 2 (8 entries)
known_table 14 A6D8 A6E8   # bank14 entity state dispatch 3 (8 entries)
known_table 14 A5E7 A66B   # bank14 entity type dispatch (66 entries)
known_table 14 BAF7 BB25   # bank14 entity state machine dispatch via $02B3 (23 entries)
known_table 14 AC71 AC75   # bank14 drop spawn dispatch (coin=$AC75, bread=$AC9F)
known_table  5 826A 828E   # bank5 sound dispatch table 1 (18 entries)
known_table  5 85B1 8621   # bank5 sound dispatch table 2 (entries 2-57)
                            # Entries 0+1 skipped: 0=$8681 (APU init), 1=$8680 (bare RTS
                            # of dispatcher — causes 2-PHA false-positive if added).

# ── Split dispatch tables (lo-bytes and hi-bytes in separate arrays) ──────────
# Format: split_table <bank> <lo_addr> <hi_addr> <count> <stride>
split_table 12 827B 8293 24 1  # bank12 room/scene state dispatch at $826E (24 states)
split_table 15 D64C D650  4 1  # fixed-bank CHR update handler dispatch at $D61D (4 slots)
split_table 14 BB27 BB28 12 2  # bank14 entity sprite handler table at $C2E9 (12 entries)

# ── Extra function seeds (dynamically dispatched, not statically discoverable) ─
# Format: extra_func <bank> <hex_addr>
extra_func 14 8C0F   # bank14 entity dispatch entry (no static reference)
extra_func  5 828E   # bank5 entity dispatch via RAM vector $2901
extra_func 15 D673   # fixed-bank VRAM write (called dynamically)
extra_func 15 C2E9   # entity loop continuation — pushed as $C2E8 by $BAD9 4-PHA
